spring:
  application:
    name: blackjack-api

  data:
    mongodb:
      # CAMBIO: Usamos 'mongo-db' porque así se llama el servicio en tu docker-compose
      uri: mongodb://mongo-db:27017/blackjack_db
      auto-index-creation: true

  r2dbc:
    # CAMBIO: Usamos 'mysql-db' porque así se llama el servicio en tu docker-compose
    # Mantenemos el puerto 3306 que es el interno de Docker
    url: r2dbc:mysql://mysql-db:3306/blackjack_db
    username: root
    password: root
    pool:
      initial-size: 10
      max-size: 20

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: true

server:
  port: 8080

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    enabled: true