services:
  # 1. Base de datos Relacional (Jugadores)
  mysql-db:
    image: mysql:8.0
    container_name: blackjack-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blackjack_db
    ports:
      - "3307:3306"
    restart: unless-stopped

  # 2. Base de datos NoSQL (Partidas)
  mongo-db:
    image: mongo:latest
    container_name: blackjack-mongo
    ports:
      - "27017:27017"
    restart: unless-stopped