

services:
  mysql-db:
    image: mysql:8.0
    container_name: blackjack-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blackjack_db
    ports:
      - "3307:3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo-db:
    image: mongo:7.0
    container_name: blackjack-mongo
    ports:
      - "27017:27017"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  blackjack-api:
    build: .
    container_name: blackjack-app
    ports:
      - "8085:8080"
    depends_on:
      mysql-db:
        condition: service_healthy
      mongo-db:
        condition: service_healthy
    restart: unless-stopped
